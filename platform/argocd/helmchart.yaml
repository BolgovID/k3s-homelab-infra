apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: argo-cd
  namespace: argo-cd
  labels:
    app.kubernetes.io/name: argo-cd
    app.kubernetes.io/part-of: homelab
spec:
  repo: https://argoproj.github.io/argo-helm
  chart: argo-cd
  version: 6.0.6
  targetNamespace: argo-cd
  valuesContent: |-
    crds:
      keep: false

    global:
      logging:
        format: json
        level: info

    controller:
      replicas: 1

    configs:
      secret:
        createSecret: false

      params:
        server.insecure: true

      repositories:
        homelab-repo:
          url: https://github.com/BolgovID/k3s-homelab-infra
          name: homelab
          type: git

    redis:
      enabled: true

    server:
      name: server
      replicas: 1
      certificate:
        enabled: true
        domain: argocd.xulihaxlab.org
        renewBefore: 360h
        duration: 9125h
        issuer:
          group: cert-manager.io
          kind: ClusterIssuer
          name: letsencrypt-cloudflare
        privateKey:
          algorithm: RSA
          encoding: PKCS8
          size: 4096
          rotationPolicy: Always
        usages:
          - server auth

      ingress:
        enabled: true
        ingressClassName: traefik
        hostname: argocd.xulihaxlab.org
        path: /
        pathType: Prefix
        service:
          port: 443
        annotations:
          kubernetes.io/ingress.class: traefik
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
