apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: gitlab
type: Opaque
stringData:
  config: |
    s3:
      bucket: CHANGE_ME_GITLAB_REGISTRY_BUCKET
      accesskey: CHANGE_ME_GITLAB_S3_ACCESS_KEY
      secretkey: CHANGE_ME_GITLAB_S3_SECRET_KEY
      region: us-east-1
      regionendpoint: "http://minio.minio.svc:9000"
      v4auth: true
