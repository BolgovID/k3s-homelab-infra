apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argo-cd
type: Opaque
stringData:
  # Generate with: openssl rand -base64 48 | tr -d '\n'
  server.secretkey: "CHANGE_ME_ARGOCD_SERVER_SECRETKEY"
  # Set plaintext here. deploy.sh hashes it to bcrypt in-cluster automatically.
  admin.password: "CHANGE_ME_ARGOCD_ADMIN_PASSWORD"
